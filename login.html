<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UstaTop - Kirish</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f0f4ff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-page { width: 100%; max-width: 420px; }
        .login-logo { text-align: center; margin-bottom: 30px; }
        .login-logo img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; }
        .login-logo h1 { font-size: 26px; font-weight: 700; color: #1e3a5f; margin-top: 10px; }
        .login-logo p { color: #64748b; font-size: 14px; }
        .login-card { background: #fff; border-radius: 20px; padding: 30px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        .login-card h2 { font-size: 18px; font-weight: 700; color: #1e3a5f; margin-bottom: 8px; text-align: center; }
        .login-card .subtitle { font-size: 13px; color: #94a3b8; text-align: center; margin-bottom: 28px; }
        .role-btn { display: flex; align-items: center; gap: 16px; width: 100%; padding: 18px 20px; margin-bottom: 14px; border: 2px solid #e2e8f0; border-radius: 14px; background: #fff; cursor: pointer; transition: all 0.25s; text-decoration: none; color: #1e3a5f; font-family: 'Montserrat', sans-serif; }
        .role-btn:last-child { margin-bottom: 0; }
        .role-btn:hover { border-color: #3b82f6; background: #eff6ff; transform: translateX(4px); }
        .role-btn .icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .icon-usta { background: #fff7ed; color: #f97316; }
        .icon-mijoz { background: #eff6ff; color: #3b82f6; }
        .icon-mehmon { background: #f0fdf4; color: #22c55e; }
        .role-btn .role-text h3 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
        .role-btn .role-text p { font-size: 12px; color: #94a3b8; font-weight: 400; }
        .role-btn .arrow { margin-left: auto; color: #cbd5e1; font-size: 14px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #94a3b8; font-size: 13px; text-decoration: none; }
        .back-link:hover { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-logo">
            <img src="logo.jpg" alt="UstaTop">
            <h1>UstaTop</h1>
            <p>Qaysi sifatda kirmoqchisiz?</p>
        </div>
        <div class="login-card">
            <h2>Kirish</h2>
            <p class="subtitle">Iltimos, o'zingizga mos variantni tanlang</p>

            <a href="registratsiya.html" class="role-btn">
                <div class="icon icon-usta"><i class="fas fa-hard-hat"></i></div>
                <div class="role-text">
                    <h3>Usta sifatida ro'yxatdan o'tish</h3>
                    <p>Xizmat ko'rsatuvchi mutaxassis</p>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="mijoz-auth.html" class="role-btn">
                <div class="icon icon-mijoz"><i class="fas fa-user"></i></div>
                <div class="role-text">
                    <h3>Mijoz tariqasida kirish</h3>
                    <p>Xizmat buyurtma qiluvchi</p>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="home.html" class="role-btn">
                <div class="icon icon-mehmon"><i class="fas fa-user-secret"></i></div>
                <div class="role-text">
                    <h3>Mehmon sifatida kirish</h3>
                    <p>Ro'yxatsiz davom eting</p>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>
        </div>
        <a href="home.html" class="back-link"><i class="fas fa-arrow-left"></i> Bosh sahifaga qaytish</a>
    </div>
</body>
</html>
