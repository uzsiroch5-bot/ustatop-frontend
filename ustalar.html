<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta Profili - UstaTop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-header {
            background: linear-gradient(135deg, #ffffff, #f0f4f8);
            padding: 40px 0;
            border-bottom: 1px solid #e1e8ed;
        }

        .profile-container {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid #fff;
        }

        .profile-info h1 {
            font-size: 32px;
            color: #1a202c;
            margin-bottom: 10px;
        }

        .profile-details {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            color: #4a5568;
        }

        .detail-item i {
            color: #3b82f6;
        }

        .contact-btn {
            background: #3b82f6;
            color: #fff;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: background 0.3s, transform 0.2s;
        }

        .contact-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        /* Portfolio Carousel Section */
        .portfolio-section {
            padding: 60px 0;
        }

        .portfolio-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 25px;
            text-align: center;
        }

        .carousel-container {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .carousel-slide {
            min-width: 100%;
            height: 400px;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.8);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
            z-index: 10;
        }

        .carousel-btn:hover {
            background: #fff;
        }

        .prev-btn {
            left: 20px;
        }

        .next-btn {
            right: 20px;
        }

        .back-nav {
            margin-bottom: 20px;
        }

        .back-nav a {
            color: #4a5568;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-nav a:hover {
            color: #3b82f6;
        }

        @media (max-width: 768px) {
            .profile-container {
                flex-direction: column;
                text-align: center;
            }

            .profile-details {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            
            .carousel-slide {
                height: 250px;
            }
        }
    </style>
</head>
<body>

    <!-- Header Navigation (Simple for profile page) -->
    <header style="background: #fff; padding: 20px 0; border-bottom: 1px solid #e1e8ed;">
        <div class="container">
            <div class="back-nav">
                <a href="home.html"><i class="fas fa-arrow-left"></i> Bosh sahifaga qaytish</a>
            </div>
        </div>
    </header>

    <!-- Profile Header -->
    <section class="profile-header">
        <div class="container">
            <div class="profile-container">
                <img src="https://images.unsplash.com/photo-1540569014015-19a7be504e3a?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60" alt="Azizov Jasur" class="profile-avatar">
                <div class="profile-info">
                    <h1>Azizov Jasur</h1>
                    <div class="profile-details">
                        <div class="detail-item"><i class="fas fa-briefcase"></i> Santexnik</div>
                        <div class="detail-item"><i class="fas fa-map-marker-alt"></i> Toshkent shahri</div>
                        <div class="detail-item"><i class="fas fa-star" style="color:#f59e0b;"></i> 4.9 (120 ta sharh)</div>
                    </div>
                    <a href="tel:+998901234567" class="contact-btn">
                        <i class="fas fa-phone-alt"></i> Bog'lanish (+998 90 123 45 67)
                    </a>
                    <a href="chat system.html" class="contact-btn" style="background: #10b981;">
                        <i class="fas fa-comment-dots"></i> Chat orqali yozish
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Portfolio Section -->
    <section class="portfolio-section">
        <div class="container">
            <h2 class="portfolio-title">Qilgan ishlaridan namunalar</h2>
            
            <div class="carousel-container">
                <button class="carousel-btn prev-btn" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
                <div class="carousel-track" id="track">
                    <div class="carousel-slide">
                        <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Santexnika ishi 1">
                    </div>
                    <div class="carousel-slide">
                        <img src="https://images.unsplash.com/photo-1577908581023-c40dff7d995c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Santexnika ishi 2">
                    </div>
                    <div class="carousel-slide">
                        <img src="https://images.unsplash.com/photo-1520699049698-acd2fceb8cc0?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Santexnika ishi 3">
                    </div>
                </div>
                <button class="carousel-btn next-btn" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </section>

    <script>
        const track = document.getElementById('track');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const slides = Array.from(track.children);
        
        let currentIndex = 0;

        function updateCarousel() {
            const slideWidth = slides[0].getBoundingClientRect().width;
            track.style.transform = 'translateX(-' + (slideWidth * currentIndex) + 'px)';
        }

        nextBtn.addEventListener('click', () => {
            if (currentIndex < slides.length - 1) {
                currentIndex++;
                updateCarousel();
            } else {
                // Loop back to start
                currentIndex = 0;
                updateCarousel();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateCarousel();
            } else {
                // Loop to end
                currentIndex = slides.length - 1;
                updateCarousel();
            }
        });

        // Update on window resize
        window.addEventListener('resize', updateCarousel);
    </script>
</body>
</html>
